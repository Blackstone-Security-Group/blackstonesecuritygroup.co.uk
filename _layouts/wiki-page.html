<html>

  {% include head.html %}

  <body>

    {% include wiki-header.html %}

    <div id="main" class="alt">
        <section id="one">
            <div id="wiki-wrapper">
                {% include wiki-sidebar.html %}
                <div id="wiki-content">
                    <header class="major">
                        <h1>{{ page.title }}</h1>
                    </header>
                    {% if page.description and page.description != "null" %}
                    <p><em>{{ page.description }}</em></p>
                    {% endif %}
                    {{ content }}
                </div>
            </div>
        </section>
    </div>

    {% include footer.html %}

  </body>

</html>
