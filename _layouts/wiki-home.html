<html>

{% include head.html %}

<body>

    {% include wiki-header.html %}

    <div id="main" class="alt">
        <section id="one">
            <div id="wiki-wrapper">
                {% include wiki-sidebar.html %}
                <div id="wiki-content">
                    <header class="major">
                        <h1>BSG Wiki</h1>
                    </header>
<div class="wiki-grid">
                        {% assign wiki_tiles = site.pages | where: "wiki-tile", true %}
                        {% for tile in wiki_tiles %}
                        <div class="wiki-grid-item">
                            <h3><a href="{{ tile.url | relative_url }}">{{ tile.title }}</a></h3>
                            <p>{{ tile.description }}</p>
                        </div>
                        {% endfor %}
                    </div>
                </div>
            </div>
        </section>
    </div>

    {% include footer.html %}

</body>

</html>
